<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Fechas especiales 💜</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #6a0dad; /* morado sólido */
        color: white;
        text-align: center;
        padding: 30px;
    }

    h1 {
        font-size: 2.5em;
    }

    .card {
        background: rgba(255,255,255,0.1);
        border-radius: 15px;
        padding: 20px;
        margin: 20px auto;
        max-width: 400px;
        box-shadow: 0 0 15px rgba(0,0,0,0.2);
    }

    .contador {
        font-size: 1.5em;
        margin-top: 15px;
    }
</style>
</head>
<body>

<h1>💜 Fechas en que nos hemos visto 💜</h1>

<div class="card">
    <p>📅 Abril 2026</p>
    <p>✨ 18 de Abril de 2026</p>
</div>

<div class="card">
    <h2>⏳ Tiempo desde la última vez</h2>
    <div id="contador" class="contador"></div>
</div>

<script>
    const fechaInicio = new Date("2026-04-18T16:36:00-06:00");

    function actualizarContador() {
        const ahora = new Date();
        let diferencia = ahora - fechaInicio;

        if (diferencia < 0) {
            document.getElementById("contador").innerHTML = "Aún no llega ese momento 💭";
            return;
        }

        let segundos = Math.floor(diferencia / 1000);
        let minutos = Math.floor(segundos / 60);
        let horas = Math.floor(minutos / 60);
        let dias = Math.floor(horas / 24);

        horas = horas % 24;
        minutos = minutos % 60;
        segundos = segundos % 60;

        document.getElementById("contador").innerHTML =
            `${dias} días, ${horas} horas, ${minutos} min, ${segundos} seg`;
    }

    setInterval(actualizarContador, 1000);
    actualizarContador();
</script>

</body>
</html>
